name: delivery_sync
description: DSV-One Delivery Sync — AI-powered project & delivery management mobile app
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Zoho Catalyst ──────────────────────────────────────────────────────────
  zcatalyst_sdk: ^2.2.4

  # ── State management ──────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Navigation ────────────────────────────────────────────────────────────
  go_router: ^13.2.4

  # ── HTTP ──────────────────────────────────────────────────────────────────
  dio: ^5.4.3+1

  # ── Secure storage ────────────────────────────────────────────────────────
  flutter_secure_storage: ^9.0.0

  # ── Fonts ─────────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1

  # ── UI & animations ───────────────────────────────────────────────────────
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  fl_chart: ^0.67.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0

  # ── Voice / Speech ────────────────────────────────────────────────────────────
  speech_to_text: ^7.3.0

  # ── Utils ──────────────────────────────────────────────────────────────────
  intl: ^0.19.0
  timeago: ^3.6.1
  logger: ^2.3.0
  equatable: ^2.0.5
  json_annotation: ^4.9.0
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.0
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - assets/images/
