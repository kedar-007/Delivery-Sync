name: Flutter CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# ── Environment ───────────────────────────────────────────────────────────────
env:
  FLUTTER_VERSION: "3.22.0"
  JAVA_VERSION: "17"

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # 1. LINT & TEST
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: mobile

      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        working-directory: mobile

      - name: Run tests
        run: flutter test --coverage
        working-directory: mobile

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: mobile/coverage/lcov.info
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. BUILD ANDROID
  # ─────────────────────────────────────────────────────────────────────────────
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: mobile

      # Decode keystore from base64 secret
      - name: Decode keystore
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
            > mobile/android/app/keystore.jks

      # Write key.properties so Gradle can sign the release build
      - name: Create key.properties
        if: github.ref == 'refs/heads/main'
        run: |
          cat > mobile/android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore.jks
          EOF

      - name: Build App Bundle (release)
        run: flutter build appbundle --release
        working-directory: mobile

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: mobile/build/app/outputs/bundle/release/app-release.aab
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. BUILD iOS
  # ─────────────────────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: mobile

      # Import Apple code-signing certificate
      - name: Import certificate
        if: github.ref == 'refs/heads/main'
        env:
          CERTIFICATE_BASE64:     ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD:   ${{ secrets.CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD:      ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_BASE64" | base64 --decode > /tmp/certificate.p12
          security import /tmp/certificate.p12 \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      # Install provisioning profile
      - name: Install provisioning profile
        if: github.ref == 'refs/heads/main'
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build IPA
        run: |
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist
        working-directory: mobile

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: mobile/build/ios/ipa/*.ipa
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. DEPLOY TO GOOGLE PLAY (main branch only)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-android:
    name: Deploy Android → Play Store
    runs-on: ubuntu-latest
    needs: build-android
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: android-release-aab

      - name: Upload to Google Play (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.dsv.deliverysync
          releaseFiles: app-release.aab
          track: internal
          status: completed
          inAppUpdatePriority: 2

  # ─────────────────────────────────────────────────────────────────────────────
  # 5. DEPLOY TO APP STORE / TESTFLIGHT (main branch only)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-ios:
    name: Deploy iOS → TestFlight
    runs-on: macos-latest
    needs: build-ios
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download IPA artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-release-ipa

      # Use App Store Connect API to upload the IPA to TestFlight
      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID:        ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID:     ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT:   ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          # Write the API key to a file
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_API_KEY_CONTENT" \
            > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8

          # Find the IPA
          IPA_PATH=$(find . -name "*.ipa" | head -1)

          # Use xcrun altool to upload
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID"
